<!DOCTYPE html>

<style>

canvas { display:block; }

  position:absolute; pointer-events:all; touch-action:none;

  background:rgba(255,255,255,0.1); color:#fff; font-family:monospace; font-weight:bold;

#btn-menu  { width:52px;height:52px;font-size:11px;background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2); }
#btn-cam   { width:68px;height:52px;border-radius:10px;font-size:10px;background:rgba(80,180,255,0.13);border-color:rgba(80,180,255,0.4); }
#joystick-base {
  position:absolute; pointer-events:all; touch-action:none;
  user-select:none; -webkit-user-select:none;
  border-radius:50%;
}
</style>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

let TRACK_W = 88; // updated per track by applyTrack
const TOTAL_LAPS = 3;

// -- Track definitions ------------------------------------------
const TRACK_DEFS = [
  {
    // ★ EASY — huge wide oval. Road is 176px wide (two car widths with room to spare).
    // Totally forgiving. You can make big mistakes and still recover.
    name:'WIDE', color:'#44ff88', diff:'EASY', diffStars:1, trackW:88,
    desc:'Huge wide road · gentle curves · totally forgiving',
    raw:[
      {x:400,y:72},{x:540,y:68},{x:658,y:90},{x:735,y:148},
      {x:762,y:228},{x:762,y:310},{x:735,y:390},
      {x:658,y:455},{x:540,y:492},{x:400,y:498},
      {x:260,y:492},{x:142,y:455},
      {x:65,y:390},{x:38,y:310},{x:38,y:228},{x:65,y:148},
      {x:142,y:90},{x:260,y:68}
    ]
  },
  {
    // ★★ EASY-MED — same rough oval, road now 144px wide.
    // Starts to punish late-braking into the hairpins.
    name:'TRACK 2', color:'#aaff44', diff:'EASY-MED', diffStars:2, trackW:72,
    desc:'Road narrows · late braking matters · first real corners',
    raw:[
      {x:400,y:72},{x:540,y:68},{x:648,y:88},{x:715,y:148},
      {x:740,y:228},{x:740,y:310},{x:715,y:390},
      {x:648,y:450},{x:540,y:480},{x:400,y:486},
      {x:260,y:480},{x:152,y:450},
      {x:85,y:390},{x:60,y:310},{x:60,y:228},{x:85,y:148},
      {x:152,y:88},{x:260,y:68}
    ]
  },
  {
    // ★★★ MEDIUM — tall narrow oval, road 116px wide.
    // Long straights build serious speed into tight hairpins.
    name:'TRACK 3', color:'#ffd700', diff:'MEDIUM', diffStars:3, trackW:58,
    desc:'Tall oval · long straights → tight hairpins · real braking zones',
    raw:[
      {x:400,y:42},{x:492,y:46},{x:558,y:72},{x:598,y:128},
      {x:612,y:200},{x:612,y:290},{x:612,y:380},{x:612,y:450},
      {x:598,y:508},{x:558,y:538},{x:492,y:558},{x:400,y:562},
      {x:308,y:558},{x:242,y:538},{x:202,y:508},
      {x:188,y:450},{x:188,y:380},{x:188,y:290},{x:188,y:200},
      {x:202,y:128},{x:242,y:72},{x:308,y:46}
    ]
  },
  {
    // ★★★★ HARD — tighter oval, road only 92px wide.
    // Walls feel close on every corner. Oversteer = instant wall contact.
    name:'TRACK 4', color:'#ff8844', diff:'HARD', diffStars:4, trackW:46,
    desc:'92px road · walls everywhere · precision required',
    raw:[
      {x:400,y:55},{x:510,y:58},{x:598,y:90},{x:648,y:155},
      {x:665,y:230},{x:665,y:310},{x:665,y:390},
      {x:648,y:460},{x:598,y:498},{x:510,y:522},{x:400,y:528},
      {x:290,y:522},{x:202,y:498},{x:152,y:460},
      {x:135,y:390},{x:135,y:310},{x:135,y:230},
      {x:152,y:155},{x:202,y:90},{x:290,y:58}
    ]
  },
  {
    // ★★★★★ EXPERT — razor-thin 72px road on a fast oval.
    // The road is barely wider than 3 cars. Any mistake is a wall hit.
    name:'KNIFE', color:'#ff3355', diff:'EXPERT', diffStars:5, trackW:36,
    desc:'72px knife-edge road · full-speed oval · zero forgiveness',
    raw:[
      {x:400,y:58},{x:540,y:62},{x:655,y:95},{x:725,y:165},
      {x:750,y:245},{x:750,y:315},{x:750,y:395},
      {x:725,y:462},{x:655,y:510},{x:540,y:528},{x:400,y:532},
      {x:260,y:528},{x:145,y:510},
      {x:75,y:462},{x:50,y:395},{x:50,y:315},{x:50,y:245},
      {x:75,y:165},{x:145,y:95},{x:260,y:62}
    ]
  },
];

let selectedTrack = 0;

function buildTrack(raw) {
  const cen = densify(laplace(raw, 8), 8);
  const SN = cen.length;
  const getNormal = i => {
    const a=cen[(i-1+SN)%SN], b=cen[(i+1)%SN];
    const dx=b.x-a.x, dy=b.y-a.y, l=Math.hypot(dx,dy)||1;
    return {nx:-dy/l, ny:dx/l};
  };
  const outer    = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x+n.nx*TRACK_W,     y:p.y+n.ny*TRACK_W};});
  const inner    = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x-n.nx*TRACK_W,     y:p.y-n.ny*TRACK_W};});
  const outerIn  = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x+n.nx*(TRACK_W-6), y:p.y+n.ny*(TRACK_W-6)};});
  const innerOut = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x-n.nx*(TRACK_W-6), y:p.y-n.ny*(TRACK_W-6)};});
  const curvMap = (() => {
    const raw2 = cen.map((_,i) => {
      const p=cen[(i-5+SN)%SN], n=cen[(i+5)%SN];
      let d=Math.atan2(n.y-cen[i].y,n.x-cen[i].x)-Math.atan2(cen[i].y-p.y,cen[i].x-p.x);
      while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
      return Math.abs(d);
    });
    return raw2.map((_,i)=>{let s=0;for(let k=-10;k<=10;k++)s+=raw2[(i+k+SN)%SN];return s/21;});
  })();
  return {cen, SN, outer, inner, outerIn, innerOut, curvMap, getNormal};
}

let RAW = TRACK_DEFS[0].raw;

function laplace(pts, n) {
  let p = pts.map(o => ({...o}));
  for (let k = 0; k < n; k++)
    p = p.map((_,i) => ({
      x: p[(i-1+p.length)%p.length].x*.25 + p[i].x*.5 + p[(i+1)%p.length].x*.25,
      y: p[(i-1+p.length)%p.length].y*.25 + p[i].y*.5 + p[(i+1)%p.length].y*.25,
    }));
  return p;
}

function densify(pts, steps) {
  const out = [];
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i+1)%pts.length];
    for (let j = 0; j < steps; j++) {
      const t = j/steps;
      out.push({x: a.x+(b.x-a.x)*t, y: a.y+(b.y-a.y)*t});
    }
  }
  return out;
}

let cen, SN, outer, inner, outerIn, innerOut, curvMap;
function getNormal(i){
  const a=cen[(i-1+SN)%SN],b=cen[(i+1)%SN];
  const dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy)||1;
  return{nx:-dy/l,ny:dx/l};
}

function applyTrack(trackIdx){
  selectedTrack=trackIdx;
  TRACK_W=TRACK_DEFS[trackIdx].trackW||58; // update global width for this track
  const t=buildTrack(TRACK_DEFS[trackIdx].raw);
  cen=t.cen; SN=t.SN; outer=t.outer; inner=t.inner;
  outerIn=t.outerIn; innerOut=t.innerOut; curvMap=t.curvMap;
}
applyTrack(0);
computeMapCam();

function nearestPt(x, y, hintSeg) {
  // Full search every frame – SN≈160, negligible cost, eliminates wrong-segment glitch.
  // We still start from the hint so the returned seg is progressive (helps lap detection).
  let best=Infinity, bi=0;
  const start = (hintSeg !== undefined) ? hintSeg : 0;
  for (let di=0; di<SN; di++) {
    const i = (start + di) % SN;
    const a=cen[i],b=cen[(i+1)%SN];
    const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;
    const t=Math.max(0,Math.min(1,((x-a.x)*dx+(y-a.y)*dy)/l2));
    const d=Math.hypot(x-a.x-t*dx,y-a.y-t*dy);
    if(d<best){best=d;bi=i;}
  }
  return {dist:best,seg:bi};
}

const oc = document.createElement('canvas');
oc.width=W; oc.height=H;
const ot = oc.getContext('2d');

function rebuildTrackCanvas(){
  ot.clearRect(0,0,W,H);

  // Richer night sky background
  const bgGrad = ot.createRadialGradient(W/2,H/2,100,W/2,H/2,500);
  bgGrad.addColorStop(0,'#0e1f3a');
  bgGrad.addColorStop(1,'#060d1a');
  ot.fillStyle=bgGrad; ot.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<280;i++){
    const sx=Math.random()*W, sy=Math.random()*H;
    const sr=Math.random();
    ot.globalAlpha=0.1+Math.random()*0.75; ot.fillStyle='#fff';
    ot.beginPath(); ot.arc(sx,sy,0.4+sr*0.8,0,Math.PI*2); ot.fill();
  }
  ot.globalAlpha=1;

  // Grass with subtle variation
  const grassGrad = ot.createRadialGradient(W/2,H/2,60,W/2,H/2,520);
  grassGrad.addColorStop(0,'#1e4a2e');
  grassGrad.addColorStop(1,'#0d2418');
  ot.fillStyle=grassGrad;
  ot.beginPath(); ot.moveTo(outer[0].x,outer[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(outer[i].x,outer[i].y);
  ot.closePath(); ot.fill();

  // Inner grass (darker)
  ot.fillStyle='#091a10';
  ot.beginPath(); ot.moveTo(inner[0].x,inner[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(inner[i].x,inner[i].y);
  ot.closePath(); ot.fill();

  // Road base (dark asphalt)
  const roadPath = new Path2D();
  roadPath.moveTo(outer[0].x,outer[0].y);
  for(let i=1;i<SN;i++) roadPath.lineTo(outer[i].x,outer[i].y);
  roadPath.closePath();
  roadPath.moveTo(inner[0].x,inner[0].y);
  for(let i=1;i<SN;i++) roadPath.lineTo(inner[i].x,inner[i].y);
  roadPath.closePath();
  ot.fillStyle='#1e1e1e'; ot.fill(roadPath,'evenodd');

  // Road surface texture - subtle grain
  ot.save();
  const roadPath2 = new Path2D();
  roadPath2.moveTo(outer[0].x,outer[0].y);
  for(let i=1;i<SN;i++) roadPath2.lineTo(outer[i].x,outer[i].y);
  roadPath2.closePath();
  roadPath2.moveTo(inner[0].x,inner[0].y);
  for(let i=1;i<SN;i++) roadPath2.lineTo(inner[i].x,inner[i].y);
  roadPath2.closePath();
  ot.clip(roadPath2,'evenodd');
  // Subtle road grain
  for(let i=0;i<400;i++){
    const gx=Math.random()*W, gy=Math.random()*H;
    ot.globalAlpha=0.03+Math.random()*0.05;
    ot.fillStyle=Math.random()>0.5?'#fff':'#000';
    ot.fillRect(gx,gy,1+Math.random()*2,1+Math.random()*2);
  }
  ot.restore();
  ot.globalAlpha=1;

  // Outer walls
  [[outer,'outer'],[inner,'inner']].forEach(([wall])=>{
    // Shadow
    ot.strokeStyle='rgba(0,0,0,0.7)'; ot.lineWidth=15;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    // Wall base
    ot.strokeStyle='#2a2a2a'; ot.lineWidth=10;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    // Edge highlight
    ot.strokeStyle='rgba(90,90,90,0.6)'; ot.lineWidth=2;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    // Kerbs - alternating red/white, slightly wider
    const segLen = 16;
    for(let i=0;i<SN;i++){
      const col=Math.floor(i/segLen)%2===0?'#cc1111':'#eeeeee';
      ot.strokeStyle=col; ot.lineWidth=4;
      ot.lineCap='butt';
      ot.beginPath(); ot.moveTo(wall[i].x,wall[i].y);
      ot.lineTo(wall[(i+1)%SN].x,wall[(i+1)%SN].y); ot.stroke();
    }
  });

  // Road inner edge (repaint over kerbs to clean up)
  const roadPath3 = new Path2D();
  roadPath3.moveTo(outerIn[0].x,outerIn[0].y);
  for(let i=1;i<SN;i++) roadPath3.lineTo(outerIn[i].x,outerIn[i].y);
  roadPath3.closePath();
  roadPath3.moveTo(innerOut[0].x,innerOut[0].y);
  for(let i=1;i<SN;i++) roadPath3.lineTo(innerOut[i].x,innerOut[i].y);
  roadPath3.closePath();
  ot.fillStyle='#1e1e1e'; ot.fill(roadPath3,'evenodd');

  // Center dashed line
  ot.setLineDash([18,18]); ot.strokeStyle='rgba(255,255,255,0.14)'; ot.lineWidth=2;
  ot.beginPath(); ot.moveTo(cen[0].x,cen[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(cen[i].x,cen[i].y);
  ot.closePath(); ot.stroke(); ot.setLineDash([]);

  // Start/finish line - bold checkered
  {
    const n=getNormal(0);
    const p0={x:cen[0].x+n.nx*(TRACK_W-2),y:cen[0].y+n.ny*(TRACK_W-2)};
    const p1={x:cen[0].x-n.nx*(TRACK_W-2),y:cen[0].y-n.ny*(TRACK_W-2)};
    const ang=Math.atan2(cen[1].y-cen[0].y,cen[1].x-cen[0].x);
    const fdx=Math.cos(ang)*18, fdy=Math.sin(ang)*18;
    const SEGS=10;
    for(let j=0;j<SEGS;j++){
      const t=j/SEGS, t2=(j+1)/SEGS;
      const lx=p0.x+(p1.x-p0.x)*t, ly=p0.y+(p1.y-p0.y)*t;
      const rx=p0.x+(p1.x-p0.x)*t2, ry=p0.y+(p1.y-p0.y)*t2;
      // Two rows of alternating squares for checkered effect
      ot.fillStyle=j%2===0?'#fff':'#111';
      ot.beginPath(); ot.moveTo(lx,ly); ot.lineTo(rx,ry);
      ot.lineTo(rx+fdx/2,ry+fdy/2); ot.lineTo(lx+fdx/2,ly+fdy/2); ot.closePath(); ot.fill();
      ot.fillStyle=j%2===0?'#111':'#fff';
      ot.beginPath(); ot.moveTo(lx+fdx/2,ly+fdy/2); ot.lineTo(rx+fdx/2,ry+fdy/2);
      ot.lineTo(rx+fdx,ry+fdy); ot.lineTo(lx+fdx,ly+fdy); ot.closePath(); ot.fill();
    }
    // Start/finish text marker
    ot.save();
    ot.translate(cen[0].x+n.nx*(TRACK_W+12), cen[0].y+n.ny*(TRACK_W+12));
    ot.fillStyle='rgba(255,255,100,0.9)'; ot.font='bold 9px monospace';
    ot.textAlign='center'; ot.textBaseline='middle';
    ot.fillText('S/F',0,0);
    ot.restore();
  }

  // Cone markers at tight corners
  {
    const peak=Math.max(...curvMap)*0.62;
    for(let i=0;i<SN;i++){
      if(curvMap[i]>peak&&i%4===0){
        const p=inner[i];
        // Cone base
        ot.fillStyle='#ff6600';
        ot.beginPath(); ot.arc(p.x,p.y,5,0,Math.PI*2); ot.fill();
        // Cone white stripe
        ot.fillStyle='#fff';
        ot.beginPath(); ot.arc(p.x,p.y,2.5,0,Math.PI,true); ot.fill();
        // Cone tip
        ot.fillStyle='#ff6600';
        ot.beginPath(); ot.arc(p.x,p.y,1.2,0,Math.PI*2); ot.fill();
      }
    }
  }

  // Grass tufts along the outside
  for(let i=0;i<SN;i+=4){
    const n=getNormal(i);
    const hue=120+Math.sin(i*0.3)*15;
    const lightness=10+Math.random()*8;
    ot.globalAlpha=0.5+Math.random()*0.4;
    ot.fillStyle=`hsl(${hue},38%,${lightness}%)`;
    ot.beginPath();
    const gx=outer[i].x+n.nx*(14+Math.random()*10);
    const gy=outer[i].y+n.ny*(14+Math.random()*10);
    ot.arc(gx,gy,2+Math.random()*4,0,Math.PI*2); ot.fill();
  }
  ot.globalAlpha=1;
}
rebuildTrackCanvas();

// -- Audio ---------------------------------------------------
let audioReady=false, actx;
let driftOsc, driftGain;
let engineOsc, engineGain;
let nitroNoiseGain, nitroBandpass, nitroRumbleOsc, nitroRumbleGain;
let nitroBuffer=null, nitroSource=null, nitroPlaying=false, nitroAudioEl=null;
let lastCountdownBeat=-1;

function initAudio(){
  if(audioReady) return; audioReady=true;
  actx=new(window.AudioContext||window.webkitAudioContext)();

  // Drift Sound
  driftOsc=actx.createOscillator(); driftOsc.type='sawtooth'; driftOsc.frequency.value=280;
  const driftFilter=actx.createBiquadFilter(); driftFilter.type='bandpass'; driftFilter.frequency.value=800; driftFilter.Q.value=0.5;
  driftGain=actx.createGain(); driftGain.gain.value=0;
  driftOsc.connect(driftFilter); driftFilter.connect(driftGain); driftGain.connect(actx.destination);
  driftOsc.start();

  // Engine Sound
  engineOsc=actx.createOscillator(); engineOsc.type='triangle'; engineOsc.frequency.value=60;
  engineGain=actx.createGain(); engineGain.gain.value=0;
  const engineFilter=actx.createBiquadFilter(); engineFilter.type='lowpass'; engineFilter.frequency.value=1000;
  engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(actx.destination);
  engineOsc.start();

  // ── NITRO: file picker (works on file:// in all browsers) ──
  nitroNoiseGain = actx.createGain();
  nitroNoiseGain.gain.value = 0;
  nitroNoiseGain.connect(actx.destination);

  nitroBandpass  = actx.createBiquadFilter();
  nitroRumbleGain = actx.createGain();
  nitroRumbleGain.gain.value = 0;
  nitroRumbleGain.connect(actx.destination);
  nitroRumbleOsc = actx.createOscillator();
  nitroRumbleOsc.start();

  // Try fetch (works if served via http://)
  fetch('nitro.mp3')
    .then(r => { if(!r.ok) throw new Error('not found'); return r.arrayBuffer(); })
    .then(ab => actx.decodeAudioData(ab))
    .then(buf => { nitroBuffer = buf; })
    .catch(() => { /* nitro.mp3 not found, boost will be silent */ });
}

function playCollisionSound(intensity) {
  if(!audioReady) return;
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100 + Math.random()*50, actx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.1);
  g.gain.setValueAtTime(intensity * 0.15, actx.currentTime);
  g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.15);
  osc.connect(g); g.connect(actx.destination);
  osc.start(); osc.stop(actx.currentTime + 0.15);
}

function triggerExplosion(c){
  if(c.exploded) return;
  c.exploded=true; c.explodeTimer=2.2;

    smoke.push({
      x:c.x+(Math.random()-.5)*20, y:c.y+(Math.random()-.5)*20,
      vx:(Math.random()-.5)*2, vy:(Math.random()-.5)*2-1,
      r:8+Math.random()*14, life:1.2, nitro:false
    });
  }
  if(audioReady&&actx){
    stopAllSound();
    const boom=actx.createOscillator(), bg=actx.createGain();
    boom.type='sine'; boom.frequency.setValueAtTime(80,actx.currentTime);
    boom.frequency.exponentialRampToValueAtTime(20,actx.currentTime+0.6);
    bg.gain.setValueAtTime(0.6,actx.currentTime);
    bg.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.7);
    boom.connect(bg); bg.connect(actx.destination);
    boom.start(); boom.stop(actx.currentTime+0.7);
    const bufLen=actx.sampleRate*0.4;
    const nBuf=actx.createBuffer(1,bufLen,actx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1)*(1-i/bufLen);
    const ns=actx.createBufferSource();
    ns.buffer=nBuf;
    const ng=actx.createGain(); ng.gain.value=0.4;
    ns.connect(ng); ng.connect(actx.destination);
    ns.start();
  }
}

function stopAllSound(){
  if(!audioReady||!actx) return;
  try{
    const t = actx.currentTime;
    driftGain.gain.cancelScheduledValues(t);
    driftGain.gain.setValueAtTime(driftGain.gain.value, t);
    driftGain.gain.linearRampToValueAtTime(0, t + 0.08);

    nitroNoiseGain.gain.cancelScheduledValues(t);
    nitroNoiseGain.gain.setValueAtTime(nitroNoiseGain.gain.value, t);
    nitroNoiseGain.gain.linearRampToValueAtTime(0, t + 0.08);

    nitroRumbleGain.gain.cancelScheduledValues(t);
    nitroRumbleGain.gain.setValueAtTime(nitroRumbleGain.gain.value, t);
    nitroRumbleGain.gain.linearRampToValueAtTime(0, t + 0.08);

    if(nitroPlaying){
      nitroPlaying=false;
      if(nitroSource){ const s=nitroSource; nitroSource=null; setTimeout(()=>{try{s.stop();}catch(e){}},100); }
    }

    engineGain.gain.cancelScheduledValues(t);
    engineGain.gain.setValueAtTime(engineGain.gain.value, t);
    engineGain.gain.linearRampToValueAtTime(0, t + 0.15);
  }catch(e){}
}

function updateAudio(speed, maxSpeed, drifting, nitroActive){
  if(!audioReady || !actx) return;
  const ratio = Math.abs(speed) / maxSpeed;

  engineOsc.frequency.setTargetAtTime(60 + (ratio * 290), actx.currentTime, 0.05);
  engineGain.gain.setTargetAtTime(state === 'racing' ? 0.1 + (ratio * 0.15) : 0.05, actx.currentTime, 0.1);

  driftGain.gain.setTargetAtTime(drifting && ratio > 0.2 ? 0.06 : 0, actx.currentTime, 0.05);

  // ── NITRO: looping BufferSource from decoded MP3 ──
  if(nitroActive){
    if(!nitroPlaying){
      nitroPlaying = true;
      // Use nitro.mp3 if loaded, otherwise generate procedural boost sound
      if(nitroBuffer){
        nitroSource = actx.createBufferSource();
        nitroSource.buffer = nitroBuffer;
        nitroSource.loop = true;
        nitroSource.connect(nitroNoiseGain);
        nitroSource.start();
      } else {
        // Procedural nitro: filtered white noise + rumble oscillator
        const bufLen = actx.sampleRate * 2;
        const nBuf = actx.createBuffer(1, bufLen, actx.sampleRate);
        const nd = nBuf.getChannelData(0);
        for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
        nitroSource = actx.createBufferSource();
        nitroSource.buffer = nBuf;
        nitroSource.loop = true;
        const bp = actx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 0.8;
        nitroSource.connect(bp); bp.connect(nitroNoiseGain);
        nitroSource.start();
        // Rumble
        nitroRumbleOsc.type = 'sawtooth';
        nitroRumbleOsc.frequency.value = 55;
        nitroRumbleGain.gain.setTargetAtTime(0.18, actx.currentTime, 0.08);
      }
    }
    nitroNoiseGain.gain.setTargetAtTime(0.35, actx.currentTime, 0.06);
  } else {
    if(nitroPlaying){
      nitroPlaying = false;
      const fadeTime = car.nitro <= 0 ? 0.05 : 0.45;
      nitroNoiseGain.gain.cancelScheduledValues(actx.currentTime);
      nitroNoiseGain.gain.setValueAtTime(nitroNoiseGain.gain.value, actx.currentTime);
      nitroNoiseGain.gain.linearRampToValueAtTime(0, actx.currentTime + fadeTime);
      nitroRumbleGain.gain.setTargetAtTime(0, actx.currentTime, 0.15);
      if(nitroSource){
        const s = nitroSource; nitroSource = null;
        setTimeout(()=>{ try{ s.stop(); }catch(e){} }, fadeTime*1000+50);
      }
    }
  }
}

function beep(freq,duration,vol=0.35,type='sine'){

}

function applyPhysics(c,dt,throttle,steering,drift,nitro){
  const hpMult=0.45+0.55*(c.hp/100);
  const topSpd=(nitro?c.maxSpeed*1.42:c.maxSpeed)*hpMult;
  const topRev=c.maxSpeed*0.38;

  if(throttle>0){
    if(c.speed>-0.15){
      c.speed=Math.min(c.speed+c.accel*dt,topSpd);
    } else {
      c.speed=Math.min(c.speed+c.brake*0.6*dt,0);
    }
  } else if(throttle<0){
    if(c.speed>0.15){
      c.speed=Math.max(c.speed-c.brake*dt,0);
    } else if(c.speed>-0.05){
      c.speed=Math.max(c.speed-c.accel*0.65*dt,-topRev);
    } else {
      c.speed=Math.max(c.speed-c.accel*0.65*dt,-topRev);
    }
  } else {
    if(Math.abs(c.speed)>0.01){
      c.speed-=Math.sign(c.speed)*Math.min(Math.abs(c.speed),c.decel*dt);
    } else {
      c.speed=0;
    }
  }

  c.drifting=drift&&Math.abs(c.speed)>1.0;
  if(c.drifting&&!c.isAI) c.speed+=(c.speed>0?-0.055:0.055)*dt;

  if(Math.abs(c.speed)>0.05){
    const sensMult = c.isAI ? 1.0 : steerSensitivity;
    const tr=(c.drifting?c.turnRate*1.3:c.turnRate)*sensMult;
    const speedFactor=Math.min(Math.abs(c.speed)/2,1);
    c.angle+=steering*tr*Math.sign(c.speed)*speedFactor*dt;
  }

  const grip=c.drifting?(c.isAI?0.12:0.09):0.18;
  const tvx=Math.cos(c.angle)*c.speed;
  const tvy=Math.sin(c.angle)*c.speed;
  c.vx+=(tvx-c.vx)*grip*dt;
  c.vy+=(tvy-c.vy)*grip*dt;

  const slip=Math.atan2(c.vy,c.vx)-c.angle;
  const driftAngleTgt=c.drifting?-Math.sin(slip)*0.45:0;
  const driftAngleRate=c.isAI?0.08:0.15; // AI rotates into drift more gently
  c.driftAngle+=(driftAngleTgt-c.driftAngle)*driftAngleRate*dt;

  c.x+=c.vx*dt; c.y+=c.vy*dt;

  const {dist,seg}=nearestPt(c.x,c.y,c.lastSeg);
  c.lastSeg=seg;
  if(dist>TRACK_W-7){
    // Push car to exactly the safe boundary (not just 2px) to prevent wall-clipping glitch
    const cp=cen[seg], bx=cp.x-c.x, by=cp.y-c.y, bl=Math.hypot(bx,by)||1;
    const penetration = dist-(TRACK_W-8);
    c.x+=bx/bl*penetration; c.y+=by/bl*penetration;
    const impactSpd=Math.abs(c.speed);
    c.speed*=0.62; c.vx*=0.62; c.vy*=0.62;
    if(impactSpd>1.8&&impactSpd!==c.lastCollSpeed){
      const wallDmg=Math.min(18,impactSpd*2.2);
      // Lunatic: any wall contact above threshold instantly kills player
      if(!c.isAI && aiDifficulty==='hardcore' && wallDmg>0) c.hp=0;
      else c.hp=Math.max(0,c.hp-wallDmg);
      c.dmgFlash=1; c.lastCollSpeed=impactSpd;
      if(!c.isAI) screenShake=Math.min(8,impactSpd*1.2);
      if(c.dents.length<20){
        const ca=Math.cos(-(c.angle+Math.PI/2)), sa=Math.sin(-(c.angle+Math.PI/2));
        const dx2=bx/bl*(-8), dy2=by/bl*(-8);
        c.dents.push({lx:Math.max(-6,Math.min(6,dx2*ca-dy2*sa)),ly:Math.max(-13,Math.min(13,dx2*sa+dy2*ca)),a:Math.random()*Math.PI});
      }
    } else if(impactSpd<=1.8) c.lastCollSpeed=0;
    if(Math.abs(c.speed)>1.5)
      for(let k=0;k<12;k++) sparks.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*5+bx/bl,vy:(Math.random()-0.5)*5+by/bl,life:1,hue:10+Math.random()*50});
  }
}

function checkLap(c,now){
  if(c.finished) return;
  const {seg}=nearestPt(c.x,c.y,c.lastSeg);
  if(!c.leftStart&&Math.hypot(c.x-cen[0].x,c.y-cen[0].y)>TRACK_W*1.5) c.leftStart=true;
  if(c.leftStart&&seg<=4&&Math.hypot(c.x-cen[0].x,c.y-cen[0].y)<TRACK_W+8){
    if(c.vx*fwdV.x+c.vy*fwdV.y<=0) return;
    const t=now-lapStart;
    if(!c.isAI){
      const isBest=t<bestLap;
      if(isBest){
        bestLap=t;flashMsg='🏆 BEST LAP  '+fmt(t);flashAlpha=1;
        const _lk=lapRecordKey(); hs[_lk]=hs[_lk]||[];
        const worstSaved = hs[_lk].length<3 ? Infinity : hs[_lk][hs[_lk].length-1];
        if(t<worstSaved||hs[_lk].length<3){insertBestLap(t);newBestLap=true;}
      }
      else{flashMsg='🏁 LAP  '+fmt(t);flashAlpha=1;}
      lapFlashAlpha=1;
      lapFlashColor=isBest?'#ffd700':'#44ff44';
      if(gameMode==='practice') lapHistory.push({time:t,best:isBest});
      lapStart=now;
    }
    c.laps++; c.leftStart=false;
    if(gameMode==='race'&&c.laps>=TOTAL_LAPS&&!c.finished){
      c.finished=true; c.finishTime=now-raceStart;
      results.push({name:c.isAI?c.name:'YOU',time:c.finishTime,color:c.color,isPlayer:!c.isAI});
      if(!c.isAI){
        const _rk=raceRecordKey(); hs[_rk]=hs[_rk]||[];
        const worstRace = hs[_rk].length<3 ? Infinity : hs[_rk][hs[_rk].length-1];
        if(c.finishTime<worstRace||hs[_rk].length<3){insertBestRace(c.finishTime);newBestRace=true;}
        state='finished';stopAllSound();
      }
    }
    if(gameMode==='practice'&&!c.isAI&&c.laps>=TOTAL_LAPS){
      const speedrun = now - sessionStart;
      if(!hs.bestSpeedrun||speedrun<hs.bestSpeedrun){
        hs.bestSpeedrun=speedrun;saveHS(hs);newBestSpeedrun=true;
      }
      stopAllSound();state='finished';
    }
  }
}

function getStandings(){
  return allCars.map(c=>{
    const {seg}=nearestPt(c.x,c.y,c.lastSeg);
    return {c,prog:c.finished?SN*TOTAL_LAPS*2-c.finishTime:c.laps*SN+seg};
  }).sort((a,b)=>b.prog-a.prog);
}

function drawSpeedLines(c) {
  const spd = Math.hypot(c.vx, c.vy);
  const ratio = spd / c.maxSpeed;
  if(ratio < 0.68) return;
  const intensity = (ratio - 0.68) / 0.32;
  ctx.save();
  ctx.globalAlpha = intensity * 0.25;
  const bx = -Math.cos(c.angle), by = -Math.sin(c.angle);
  for(let i = 0; i < 12; i++) {
    const spread = (Math.random()-0.5) * 30;
    const px = c.x + spread*Math.sin(c.angle);
    const py = c.y - spread*Math.cos(c.angle);
    const len = 20 + Math.random()*35;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 0.5 + Math.random() * 0.8;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + bx*len, py + by*len);
    ctx.stroke();
  }
  ctx.restore();
}

let lastT=0;
function update(now){
  const dt=Math.min(now-lastT,50)/16;
  lastT=now;

  if(state==='countdown'){
    countdownT-=dt/60;
    updateCountdownAudio(countdownT);
    if(countdownT<=1&&lapStart===0){lapStart=now;raceStart=now;sessionStart=now;}
    if(countdownT<=0) state='racing';
    if(countdownT>1) return;
  }
  if(state!=='racing'&&state!=='countdown') return;

  lapTime=now-lapStart;
  if(flashAlpha>0) flashAlpha=Math.max(0,flashAlpha-0.012);
  if(lapFlashAlpha>0) lapFlashAlpha=Math.max(0,lapFlashAlpha-0.03);
  if(screenShake>0) screenShake=Math.max(0,screenShake-0.4*dt);
  allCars.forEach(c=>{if(c.dmgFlash>0) c.dmgFlash=Math.max(0,c.dmgFlash-0.04*dt);});

  const usingNitro=nitroKey()&&car.nitro>0&&car.hp>0&&!car.exploded;
  if(usingNitro){
    car.nitro=Math.max(0,car.nitro-dt*0.4);
  }

  if(car.hp<=0&&!car.exploded){
    if(aiDifficulty==='hardcore'){ screenShake=20; flashMsg='☠ ONE MISTAKE · RACE OVER'; flashAlpha=1; }
    triggerExplosion(car);
  }
  if(car.exploded){
    car.explodeTimer-=dt/60;
    if(car.explodeTimer>0&&Math.random()<0.4)
      smoke.push({x:car.x+(Math.random()-.5)*16,y:car.y+(Math.random()-.5)*16,
        vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2-0.8,
        r:6+Math.random()*10,life:1,nitro:false});
    if(car.explodeTimer<=0){
      if(gameMode==='practice'){
        stopAllSound();state='finished';
      } else {
        if(!results.find(r=>r.isPlayer))
          results.push({name:'YOU',time:0,color:car.color,isPlayer:true,dnf:true});
        stopAllSound();state='finished';
      }
    }
  }

  const wrecked=car.hp<=0;
  const _keyTh = accelKey()?1:brakeKey()?-1:0;
  const _joyTh = Math.abs(joystickY)>0.15 ? -joystickY : 0;
  const th = wrecked ? 0 : (_keyTh !== 0 ? _keyTh : _joyTh);
  const stClamped=wrecked?0:Math.max(-1,Math.min(1,(leftKey()?-1:0)+(rightKey()?1:0)+joystickX));

  applyPhysics(car,dt,th,stClamped,wrecked?false:driftKey(),wrecked?false:usingNitro);
  if(wrecked) car.speed*=Math.pow(0.92,dt);
  car.wheelRot+=car.speed*dt*0.28;
  car.steerInput+=(stClamped-car.steerInput)*0.18*dt;
  car.steerAngle+=(car.steerInput*0.61-car.steerAngle)*0.25*dt;

  const slip=Math.abs(Math.atan2(car.vy,car.vx)-car.angle);
  if(car.speed>1.5&&(car.drifting||slip>0.15)){
    skids.push({x:car.x-Math.cos(car.angle)*10,y:car.y-Math.sin(car.angle)*10,drift:car.drifting});
  }
  aiCars.forEach(ai=>{
    if(ai.drifting&&ai.speed>1.5)
      skids.push({x:ai.x-Math.cos(ai.angle)*10,y:ai.y-Math.sin(ai.angle)*10,drift:true});
    if(skids.length>600) skids.shift();
  });
  if(car.drifting&&car.speed>1)
    for(let i=0;i<3;i++) smoke.push({
      x:car.x-Math.cos(car.angle)*12+(Math.random()-.5)*8,
      y:car.y-Math.sin(car.angle)*12+(Math.random()-.5)*8,
      vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:5+Math.random()*6,life:1,nitro:false
    });
  if(usingNitro && car.nitro>0)
    for(let i=0;i<3;i++) smoke.push({
      x:car.x-Math.cos(car.angle)*14+(Math.random()-.5)*6,
      y:car.y-Math.sin(car.angle)*14+(Math.random()-.5)*6,
      vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:3+Math.random()*6,life:0.9,nitro:true
    });

  for(let i=smoke.length-1;i>=0;i--){
    const s=smoke[i];s.x+=s.vx;s.y+=s.vy;s.r+=0.45;s.life-=0.038;
    if(s.life<=0) smoke.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.life-=0.055;
    if(s.life<=0) sparks.splice(i,1);
  }

  if(state==='racing') checkLap(car,now);

  // ── Update follow cam (only for Camera 2 and Camera 3) ──────
  if((state==='racing'||state==='countdown') && (camMode===1||camMode===2)){
    const lp = Math.min(1, 0.12 * dt);
    camX += (car.x - camX) * lp;
    camY += (car.y - camY) * lp;
    let diff = car.angle - camAngle;
    while(diff >  Math.PI) diff -= 2*Math.PI;
    while(diff < -Math.PI) diff += 2*Math.PI;
    camAngle += diff * Math.min(1, 0.10 * dt);
  }

  if(gameMode==='race'){
    for(const ai of aiCars){
      if(ai.finished) continue;
      const {seg}=nearestPt(ai.x,ai.y,ai.lastSeg);
      ai.lastSeg=seg;

      // ── Racing line: shift trackOffset toward outside of upcoming corner ──
      const cornerLookSeg=(seg+Math.round(ai.lookahead*0.8))%SN;
      const cornerCurv=curvMap[cornerLookSeg];
      // Detect corner direction using cross product of forward and look-ahead vectors
      const fwdSeg=cen[(seg+3)%SN], behSeg=cen[(seg-3+SN)%SN];
      const lookSeg=cen[(seg+ai.lookahead)%SN];
      const fwdX=fwdSeg.x-behSeg.x, fwdY=fwdSeg.y-behSeg.y;
      const toX=lookSeg.x-cen[seg].x, toY=lookSeg.y-cen[seg].y;
      const cross=fwdX*toY-fwdY*toX; // positive = turning left, negative = turning right
      const basOff=AI_DEFS[aiCars.indexOf(ai)].offset;
      // Widen entry (opposite of turn direction), tighten exit
      const cornerSign=cornerCurv>0.05?(cross>0?1:-1):0;
      const targetOffset=basOff + cornerSign*(TRACK_W*0.38)*(cornerCurv/0.18);
      ai.trackOffset+=(Math.max(-TRACK_W*0.45,Math.min(TRACK_W*0.45,targetOffset))-ai.trackOffset)*0.03*dt;

      // ── Waypoint steering (near + far blend) ──
      const nearIdx=(seg+Math.max(4,Math.round(ai.lookahead*0.4)))%SN;
      const farIdx=(seg+ai.lookahead)%SN;
      const nN=getNormal(nearIdx), nF=getNormal(farIdx);
      let dN=Math.atan2(cen[nearIdx].y+nN.ny*ai.trackOffset-ai.y, cen[nearIdx].x+nN.nx*ai.trackOffset-ai.x)-ai.angle;
      let dF=Math.atan2(cen[farIdx].y+nF.ny*ai.trackOffset-ai.y,  cen[farIdx].x+nF.nx*ai.trackOffset-ai.x)-ai.angle;
      while(dN>Math.PI)dN-=2*Math.PI; while(dN<-Math.PI)dN+=2*Math.PI;
      while(dF>Math.PI)dF-=2*Math.PI; while(dF<-Math.PI)dF+=2*Math.PI;
      const speedBlend=Math.min(1,ai.speed/ai.maxSpeed);
      // More skill = less noise, crisper steering
      ai.noisePhase+=dt*0.015*(1-ai.skill)*(ai.noiseMult||1);
      const noise=Math.sin(ai.noisePhase)*0.12*(1-ai.skill)*(ai.noiseMult||1);
      const rawSt=Math.max(-1,Math.min(1,(dN*(1-speedBlend*0.45)+dF*(speedBlend*0.45))*4.5+noise));
      // During collision cooldown: blend towards track line slowly (don't snap)
      if((ai.collisionCooldown||0)>0){
        ai.collisionCooldown-=dt;
        ai.steerInput+=(rawSt-ai.steerInput)*Math.min(1,0.06*dt); // very slow recovery
      } else {
        const steerSmooth=aiDifficulty==='hardcore'?0.35:aiDifficulty==='pro'?0.30:aiDifficulty==='normal'?0.14:0.10;
        ai.steerInput+=(rawSt-ai.steerInput)*Math.min(1,steerSmooth*dt);
      }

      // ── Speed / braking: look FURTHER ahead for corners ──
      const lapBonus=Math.min(0.08,ai.laps*0.04);
      const effectiveSkill=Math.min(0.99,ai.skill+lapBonus);
      // Check peak curvature over a range ahead (not just one point)
      let peakC=0;
      const brakeLook=Math.round(ai.lookahead*1.8);
      for(let k=5;k<=brakeLook;k+=3) peakC=Math.max(peakC,curvMap[(seg+k)%SN]);

      // Target speed: slows proportional to worst upcoming corner
      // Higher skill = shallower slowdown curve (brave late-braking)
      const cornerFactor=Math.max(0,1-peakC*(aiDifficulty==='hardcore'?4.2:aiDifficulty==='pro'?4.6:6.5)*(1/(effectiveSkill*1.1)));
      const minSpeedFrac=0.32+effectiveSkill*0.14; // better drivers don't scrub as much speed
      const tgtSpd=ai.maxSpeed*effectiveSkill*Math.max(minSpeedFrac,cornerFactor);

      const spdErr=tgtSpd-ai.speed;
      // FIXED: use brakeMult so pro brakes HARD (up to -1.0), beginner barely brakes
      const brakeMult=ai.brakeMult||1.0;
      let throttleCmd;
      if(spdErr>0.25)      throttleCmd=1;
      else if(spdErr>-0.3) throttleCmd=spdErr*1.5;
      else                 throttleCmd=Math.max(-1, spdErr*brakeMult*1.2); // hard braking
      ai.throttleSmooth+=(throttleCmd-ai.throttleSmooth)*Math.min(1,0.11*dt);

      // ── Rubber-band: if AI falls >1.5 laps behind leader, get a soft boost ──
      const standings=getStandings();
      const myRank=standings.findIndex(s=>s.c===ai);
      if(myRank===standings.length-1&&ai.laps<car.laps-1){
        ai.throttleSmooth=Math.min(1,ai.throttleSmooth+0.15);
      }

      // ═══════════════════════════════════════════════════════════
      // SMART DRIFT ENGINE — pro and lunatic share same logic
      // Drift is ONLY used when it shortens the cornering arc faster
      // than grip would (i.e. genuine sharp corner at genuine speed)
      // ═══════════════════════════════════════════════════════════
      const trackIsWide = TRACK_W > 82;

      // Scan corner window ahead for peak curvature
      let cornerPeak=0, cornerPeakIdx=0;
      for(let ck=1;ck<=12;ck++){
        const cv=curvMap[(seg+ck)%SN];
        if(cv>cornerPeak){cornerPeak=cv;cornerPeakIdx=ck;}
      }

      // How far away is the corner apex?
      const apexDist = cornerPeakIdx; // segments until sharpest point

      // Current body slip angle (how sideways the car already is)
      const bodySlip=Math.abs(Math.atan2(ai.vy,ai.vx)-ai.angle);

      // Drift is beneficial when:
      //   a) Corner is genuinely sharp (top 45% of track's curvature range)
      //   b) Car is moving fast enough to break traction
      //   c) We are approaching (not past) the apex
      //   d) Steering is actually loaded
      //   e) Track is not overly wide (no need to drift)
      const trackPeak=Math.max(...curvMap);
      const trackMin=Math.min(...curvMap);
      const sharpThresh=trackMin+(trackPeak-trackMin)*0.55; // top 45% of THIS track
      const isSharpCorner = cornerPeak > sharpThresh;
      const approachingApex = apexDist > 1 && apexDist < 10;
      const hasDriftSpeed   = ai.speed > ai.maxSpeed * 0.48;
      const steeringLoaded  = Math.abs(rawSt) > 0.20 || Math.abs(ai.steerInput) > 0.18;
      const alreadySliding  = bodySlip > 0.08; // already breaking traction naturally

      const wantDrift = ai.canDrift && !trackIsWide
        && (isSharpCorner || alreadySliding)
        && approachingApex
        && hasDriftSpeed
        && steeringLoaded;

      // Hold timer: min hold prevents flicker, but smart exit when apex passed
      if(wantDrift) ai.driftHold=(ai.driftHold||0)+dt;
      else          ai.driftHold=Math.max(0,(ai.driftHold||0)-dt*1.1);
      const aiDrifting = ai.driftHold > 3; // same for pro and lunatic

      // ═══════════════════════════════════════════════════════════
      // SMART NITRO ENGINE — measures clear straight length ahead
      // Only fires when the boost will actually be used at full speed
      // ═══════════════════════════════════════════════════════════
      // Scan how many segments ahead stay BELOW the "straight" threshold
      let clearStraightLen=0;
      const nitroStraightThresh = trackMin + (trackPeak-trackMin)*0.50;
      for(let nk=1;nk<=40;nk++){
        if(curvMap[(seg+nk)%SN] < nitroStraightThresh) clearStraightLen++;
        else break;
      }
      // Nitro is only worth firing if we have ≥10 clear segments ahead
      // AND we're not about to brake (throttle is open)
      const nitroStraightReady = clearStraightLen >= 10;
      const notBraking = ai.throttleSmooth > 0.55;
      const isBehind=myRank>0;
      // Fire nitro: confirmed long straight, throttle open, and either behind or big straight
      const aiUsingNitro = ai.canNitro && ai.nitro>0
        && nitroStraightReady
        && notBraking
        && (isBehind || clearStraightLen >= 16);
      if(ai.canNitro) ai.nitro=aiUsingNitro?Math.max(0,ai.nitro-dt*0.4):ai.nitro;

      applyPhysics(ai,dt,ai.throttleSmooth,ai.steerInput,aiDrifting,aiUsingNitro);
      ai.wheelRot+=ai.speed*dt*0.28;
      // Visual: smoke when AI drifts, boost flame when AI uses nitro
      if(ai.drifting&&ai.speed>1&&Math.random()<0.35)
        smoke.push({x:ai.x-Math.cos(ai.angle)*12,y:ai.y-Math.sin(ai.angle)*12,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5-0.4,r:5+Math.random()*8,life:0.7,nitro:false});
      if(aiUsingNitro&&Math.random()<0.4)
        smoke.push({x:ai.x-Math.cos(ai.angle)*14,y:ai.y-Math.sin(ai.angle)*14,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,r:4+Math.random()*6,life:0.5,nitro:true});
      ai.steerAngle+=(ai.steerInput*0.61-ai.steerAngle)*0.25*dt;
      if(state==='racing') checkLap(ai,now);
    }
    if(state==='racing'&&aiCars.every(a=>a.finished)){state='finished';stopAllSound();}
  }

  if(gameMode==='race'){
    const CAR_R=11;
    for(let i=0;i<allCars.length;i++) for(let j=i+1;j<allCars.length;j++){
      const a=allCars[i],b=allCars[j];
      if(a.exploded||b.exploded) continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001;
      if(d>=CAR_R*2) continue;
      // ── 1. Full position separation in one step ──────────────
      const ov=CAR_R*2-d, nx=dx/d, ny=dy/d;
      // Mass-weighted push: heavier car (higher hp) moves less
      const massA=Math.max(20,a.hp), massB=Math.max(20,b.hp);
      const pushA=ov*(massB/(massA+massB));
      const pushB=ov*(massA/(massA+massB));
      a.x-=nx*pushA; a.y-=ny*pushA;
      b.x+=nx*pushB; b.y+=ny*pushB;

      // ── 2. Velocity impulse (elastic-ish, restitution=0.7) ──
      const rvn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(rvn<-0.05){  // only resolve if approaching (not already separating)
        const restitution=0.70;
        const imp=-(1+restitution)*rvn/(1/massA+1/massB);
        a.vx-=(imp/massA)*nx; a.vy-=(imp/massA)*ny;
        b.vx+=(imp/massB)*nx; b.vy+=(imp/massB)*ny;
        a.speed=Math.cos(a.angle)*a.vx+Math.sin(a.angle)*a.vy;
        b.speed=Math.cos(b.angle)*b.vx+Math.sin(b.angle)*b.vy;

        // ── 3. AI collision recovery: briefly steer+throttle away ──
        [a,b].forEach((c,ci)=>{
          if(!c.isAI) return;
          const sign=ci===0?-1:1; // a was pushed negative nx, b positive
          // Compute sideways component to decide steering correction
          const rightX=-Math.sin(c.angle), rightY=Math.cos(c.angle);
          const sideNudge=(nx*rightX+ny*rightY)*sign;
          c.steerInput=Math.max(-1,Math.min(1,c.steerInput-sideNudge*1.8));
          // Also slightly reduce throttle so they don't just slam again
          c.throttleSmooth=Math.min(c.throttleSmooth, 0.35);
          c.collisionCooldown=(c.collisionCooldown||0)+18; // ticks of modified behaviour
        });

        // ── 4. Damage / sparks ──────────────────────────────────
        const im=Math.abs(rvn);
        if(im>1.0){
          const dmg=Math.min(12,im*1.5);
          // Hardcore: any car collision instantly kills player
          if(aiDifficulty==='hardcore'){
            if(a===car){ a.hp=0; } else { a.hp=Math.max(0,a.hp-dmg); }
            if(b===car){ b.hp=0; } else { b.hp=Math.max(0,b.hp-dmg); }
          } else {
            a.hp=Math.max(0,a.hp-dmg); b.hp=Math.max(0,b.hp-dmg);
          }
          a.dmgFlash=1; b.dmgFlash=1;
          if(a===car||b===car) screenShake=Math.min(6,im*0.8);
          const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
          try{ playCollisionSound(im); }catch(e){}
          for(let k=0;k<8;k++) sparks.push({x:mx,y:my,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:0.9,hue:10+Math.random()*50});
        }
      }
    }
  }

  updateAudio(Math.hypot(car.vx,car.vy),car.maxSpeed,car.drifting, usingNitro);
  updateWheel();
}

function lightenColor(hex, amt){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((c>>16)&255)+Math.round(255*amt));
  const g=Math.min(255,((c>>8)&255)+Math.round(255*amt));
  const b=Math.min(255,(c&255)+Math.round(255*amt));
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amt){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,((c>>16)&255)-Math.round(255*amt));
  const g=Math.max(0,((c>>8)&255)-Math.round(255*amt));
  const b=Math.max(0,(c&255)-Math.round(255*amt));
  return `rgb(${r},${g},${b})`;
}

function drawCar(c){
  if(c.exploded){
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle+Math.PI/2);
    ctx.fillStyle='rgba(20,10,5,0.92)';
    ctx.beginPath();ctx.roundRect(-6,-12,13,24,3);ctx.fill();
    ctx.strokeStyle='rgba(255,80,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-6,-12,13,24,3);ctx.stroke();
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.angle+Math.PI/2);
  ctx.rotate(c.driftAngle);
  const w=13,h=26;

  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.roundRect(-w/2+3,h/2-h+3,w,h,3);ctx.fill();

  ctx.fillStyle=c.color;
  ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();
  if(c.hp<100){ctx.fillStyle=`rgba(80,0,0,${(1-c.hp/100)*0.45})`;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();}
  if(c.dmgFlash>0){ctx.fillStyle=`rgba(255,0,0,${c.dmgFlash*0.55})`;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();}

  if(c.dents.length>0){
    ctx.save();ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=0.8;
    c.dents.forEach(d=>{ctx.save();ctx.translate(d.lx,d.ly);ctx.rotate(d.a);ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(2,0);ctx.stroke();ctx.restore();});
    ctx.restore();
  }

  ctx.fillStyle='rgba(140,210,255,0.88)';
  ctx.beginPath();ctx.roundRect(-w/2+2,-h/2+2,w-4,h*0.3,1);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(-w/2+2,-h/2+2+h*0.3,w-4,h*0.35);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-2,-h/2,4,h);

  [[-w/2-4,-h/2,4,8,true],[w/2,-h/2,4,8,true],[-w/2-4,h/2-9,4,7,false],[w/2,h/2-9,4,7,false]].forEach(([rx,ry,rw,rh,isFront])=>{
    ctx.save();
    ctx.translate(rx+rw/2,ry+rh/2);
    if(isFront) ctx.rotate(c.steerAngle);
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,rw,rh,1.5);ctx.fill();
    ctx.strokeStyle='rgba(80,80,80,0.8)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,rw,rh,1.5);ctx.stroke();
    ctx.save();ctx.rotate(c.wheelRot);
    ctx.strokeStyle='rgba(130,130,130,0.5)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,-(rh/2-1));ctx.lineTo(0,rh/2-1);ctx.stroke();
    ctx.strokeStyle='rgba(130,130,130,0.3)';
    ctx.beginPath();ctx.moveTo(-(rw/2-0.5),0);ctx.lineTo(rw/2-0.5,0);ctx.stroke();
    ctx.fillStyle='rgba(160,160,160,0.45)';ctx.beginPath();ctx.arc(0,0,0.7,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.restore();
  });

  ctx.fillStyle='rgba(255,240,130,0.95)';
  ctx.fillRect(-w/2+1,-h/2,3,3);ctx.fillRect(w/2-4,-h/2,3,3);
  ctx.fillStyle='rgba(255,50,50,0.9)';
  ctx.fillRect(-w/2+1,h/2-4,3,3);ctx.fillRect(w/2-4,h/2-4,3,3);

  if(c.isAI){
    ctx.restore();ctx.save();ctx.translate(c.x,c.y);
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 8px monospace';
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(c.name,0,16);
  }
  ctx.restore();

  if(c.drifting&&c.speed>1){
    ctx.save();ctx.globalAlpha=0.18+Math.random()*0.08;
    ctx.strokeStyle=c.color;ctx.lineWidth=3;ctx.shadowColor=c.color;ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(c.x,c.y,19+Math.random()*5,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  if(!c.isAI&&nitroKey()&&car.nitro>0&&(state==='racing'||state==='countdown')){
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle+Math.PI/2);
    const g=ctx.createRadialGradient(0,h/2+4,0,0,h/2+4,12);
    g.addColorStop(0,'rgba(100,180,255,0.9)');g.addColorStop(0.5,'rgba(0,100,255,0.5)');g.addColorStop(1,'rgba(0,0,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,h/2+4,5,12+Math.random()*6,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  {
    const BW=24,BH=4,BY=-22,isP=c===car;
    if(isP||c.hp<100||c.dmgFlash>0){
      ctx.save();ctx.translate(c.x,c.y);
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(-BW/2-1,BY-1,BW+2,BH+2,2);ctx.fill();
      ctx.fillStyle='rgba(80,0,0,0.8)';ctx.beginPath();ctx.roundRect(-BW/2,BY,BW,BH,1);ctx.fill();
      const frac=c.hp/100;
      ctx.fillStyle=c.hp>60?'#44ee44':c.hp>30?'#ffaa00':'#ff2222';
      if(frac>0){ctx.beginPath();ctx.roundRect(-BW/2,BY,BW*frac,BH,1);ctx.fill();}
      if(c.dmgFlash>0){ctx.fillStyle=`rgba(255,60,60,${c.dmgFlash*0.7})`;ctx.beginPath();ctx.roundRect(-BW/2,BY,BW,BH,1);ctx.fill();}
      if(isP){ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('YOU',0,BY-1);}
      ctx.restore();
    }
  }
}

function drawHUD(){
  const standings=getStandings();
  const myPos=standings.findIndex(s=>s.c===car)+1;
  const spd=Math.hypot(car.vx,car.vy)/car.maxSpeed;

  const PX = W/2, PY = H - 30;
  const BW = 140, BH = 18, BR = 4;

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(PX-BW/2,PY-BH*3-14,BW,BH,BR);ctx.fill();
  ctx.fillStyle=spd>0.75?'#ff4444':spd>0.45?'#ffaa00':'#44dd44';
  if(spd>0) ctx.beginPath(),ctx.roundRect(PX-BW/2,PY-BH*3-14,BW*Math.min(spd,1),BH,BR),ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(Math.round(spd*220)+' km/h',PX,PY-BH*3-14+BH/2);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 10px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('SPD',PX-BW/2-4,PY-BH*3-14+BH/2);

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(PX-BW/2,PY-BH*2-8,BW,BH,BR);ctx.fill();
  ctx.fillStyle=car.hp>60?'#44dd44':car.hp>30?'#ffaa00':'#ff2222';
  if(car.hp>0) ctx.beginPath(),ctx.roundRect(PX-BW/2,PY-BH*2-8,BW*(car.hp/100),BH,BR),ctx.fill();
  // Lunatic: permanent red danger vignette
  if(aiDifficulty==='hardcore'&&(state==='racing'||state==='countdown')){

    lv.addColorStop(1,'rgba(200,0,0,0.28)');

  }
  if(car.dmgFlash>0){ctx.fillStyle=`rgba(255,0,0,${car.dmgFlash*0.4})`;ctx.beginPath();ctx.roundRect(PX-BW/2,PY-BH*2-8,BW,BH,BR);ctx.fill();}
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(car.hp<=0?'WRECKED':Math.ceil(car.hp)+'%',PX,PY-BH*2-8+BH/2);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 10px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('HP',PX-BW/2-4,PY-BH*2-8+BH/2);

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(PX-BW/2,PY-BH-2,BW,BH,BR);ctx.fill();
  ctx.fillStyle=car.nitro>30?'#1188ff':car.nitro>10?'#ff8800':'#ff2222';
  if(car.nitro>0) ctx.beginPath(),ctx.roundRect(PX-BW/2,PY-BH-2,BW*(car.nitro/100),BH,BR),ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(car.nitro<5?'EMPTY':Math.ceil(car.nitro)+'%',PX,PY-BH-2+BH/2);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 10px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('NOS',PX-BW/2-4,PY-BH-2+BH/2);

  if(car.drifting){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W/2-52,H/2+30,104,24,5);ctx.fill();
    ctx.fillStyle='#ff8800';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#ff8800';ctx.shadowBlur=10;ctx.fillText('⟳ DRIFT',W/2,H/2+42);ctx.shadowBlur=0;
  }

  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.beginPath();ctx.roundRect(W-198,12,184,56,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 26px monospace';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText(fmt(lapTime),W-14,16);
  ctx.fillStyle='#888';ctx.font='11px monospace';
  ctx.fillText('BEST: '+(bestLap<Infinity?fmt(bestLap):'--:--.--'),W-14,48);

  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.beginPath();ctx.roundRect(12,12,152,56,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  if(gameMode==='practice'){
    ctx.fillText('LAP '+Math.max(car.laps+1,1),20,16);
    ctx.fillStyle='#44aaff';ctx.font='bold 12px monospace';ctx.fillText('PRACTICE',20,40);
    ctx.fillStyle='rgba(68,170,255,0.5)';ctx.font='9px monospace';ctx.fillText('ESC=pause · R=restart',20,54);
  } else {
    ctx.fillText('LAP '+Math.min(car.laps+1,TOTAL_LAPS)+'/'+TOTAL_LAPS,20,16);
    ctx.fillStyle=['#ffd700','#c0c0c0','#cd7f32','#aaa'][myPos-1]||'#aaa';
    ctx.font='bold 24px monospace';ctx.fillText('P'+myPos,20,40);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='11px monospace';
    ctx.fillText(['1ST','2ND','3RD','4TH'][myPos-1]||'',62,48);
  }

  if(gameMode==='race'){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(W-145,78,132,standings.length*24+12,5);ctx.fill();
    ctx.font='11px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    standings.forEach((s,i)=>{
      const isMe=s.c===car;
      ctx.fillStyle=isMe?'#fff':s.c.color;ctx.font=isMe?'bold 11px monospace':'11px monospace';
      ctx.fillText(`${i+1}. ${s.c.isAI?s.c.name:'YOU'}${s.c.finished?' ✓':''}`,W-137,90+i*24);
      if(isMe&&!s.c.finished) for(let l=0;l<TOTAL_LAPS;l++){ctx.fillStyle=l<s.c.laps?'#fff':'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(W-18-l*9,90+i*24,3,0,Math.PI*2);ctx.fill();}
    });
  } else {
    const shown=lapHistory.slice(-4);
    if(shown.length){
      ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(W-148,78,136,shown.length*22+28,5);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText('LAP HISTORY',W-140,92);
      shown.forEach((lh,i)=>{
        ctx.fillStyle=lh.best?'#ffd700':'rgba(255,255,255,0.75)';ctx.font=lh.best?'bold 11px monospace':'11px monospace';
        ctx.fillText(`L${lapHistory.length-shown.length+i+1}  ${fmt(lh.time)}${lh.best?' ★':''}`,W-140,106+i*22);
      });
    }
  }

  if(flashAlpha>0){
    ctx.save();ctx.globalAlpha=flashAlpha;
    ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#000';ctx.fillText(flashMsg,W/2+2,H/2-50+2);
    ctx.fillStyle=flashMsg.includes('BEST')?'#ffd700':'#fff';ctx.fillText(flashMsg,W/2,H/2-50);
    ctx.restore();
  }
}

let mouseX=0,mouseY=0;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)/canvasScale;mouseY=(e.clientY-r.top)/canvasScale;});
function hitTest(b){return b&&mouseX>=b.x&&mouseX<=b.x+b.w&&mouseY>=b.y&&mouseY<=b.y+b.h;}
function drawButton(label,x,y,w,h,color,hov){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(x+3,y+4,w,h,8);ctx.fill();
  ctx.fillStyle=hov?color:'rgba(255,255,255,0.08)';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();
  if(hov){ctx.shadowColor=color;ctx.shadowBlur=18;}
  ctx.strokeStyle=hov?color:'rgba(255,255,255,0.22)';ctx.lineWidth=hov?2:1;
  ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=hov?'#fff':'rgba(255,255,255,0.7)';ctx.font=`bold ${hov?20:18}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x+w/2,y+h/2);
  return {x,y,w,h};
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const gx=(e.clientX-r.left)/canvasScale,gy=(e.clientY-r.top)/canvasScale;
  if(state==='finished'){
    if(doAgainBtn&&gx>=doAgainBtn.x&&gx<=doAgainBtn.x+doAgainBtn.w&&gy>=doAgainBtn.y&&gy<=doAgainBtn.y+doAgainBtn.h){
      initAudio();
      if(gameMode==='race') state='trackselect';
      else state='trackselect';
    }
    if(menuBtn&&gx>=menuBtn.x&&gx<=menuBtn.x+menuBtn.w&&gy>=menuBtn.y&&gy<=menuBtn.y+menuBtn.h){state='start';}
  }
  if(state==='settings'){
    const {_settingsLbx:lbx,_settingsRbx:rbx,_settingsArrowY:ay,_settingsBtnH:bh,_settingsBtnW:bw,
           _settingsResetX:rx,_settingsResetY:ry,_settingsResetW:rw}=render;
    if(lbx!=null&&gx>=lbx&&gx<=lbx+bw&&gy>=ay&&gy<=ay+bh) saveSteerSens(Math.max(0.3,steerSensitivity-0.1));
    if(lbx!=null&&gx>=rbx&&gx<=rbx+bw&&gy>=ay&&gy<=ay+bh) saveSteerSens(Math.min(2.0,steerSensitivity+0.1));
    if(rx!=null&&gx>=rx&&gx<=rx+rw&&gy>=ry&&gy<=ry+bh)   saveSteerSens(1.0);
  }
  if(state==='pause'){
    const {_pauseLAB:la,_pauseRAB:ra,_pauseResetAB:rea,_pauseResumeB:rsm,_pauseRestartB:rst,_pauseQuitB:qt}=render;
    if(la&&gx>=la.x&&gx<=la.x+la.w&&gy>=la.y&&gy<=la.y+la.h) saveSteerSens(Math.max(0.3,steerSensitivity-0.1));
    if(ra&&gx>=ra.x&&gx<=ra.x+ra.w&&gy>=ra.y&&gy<=ra.y+ra.h) saveSteerSens(Math.min(2.0,steerSensitivity+0.1));
    if(rea&&gx>=rea.x&&gx<=rea.x+rea.w&&gy>=rea.y&&gy<=rea.y+rea.h) saveSteerSens(1.0);
    if(rsm&&gx>=rsm.x&&gx<=rsm.x+rsm.w&&gy>=rsm.y&&gy<=rsm.y+rsm.h){ initAudio(); state='racing'; }
    if(rst&&gx>=rst.x&&gx<=rst.x+rst.w&&gy>=rst.y&&gy<=rst.y+rst.h){ initAudio(); stopAllSound(); beginCountdown(); }
    if(qt&&gx>=qt.x&&gx<=qt.x+qt.w&&gy>=qt.y&&gy<=qt.y+qt.h){ stopAllSound(); state='start'; }
  }
});

// applyWorldTransform removed — inline in render

function render(now){
  const shakeX = screenShake>0 ? (Math.random()-0.5)*screenShake : 0;
  const shakeY = screenShake>0 ? (Math.random()-0.5)*screenShake : 0;

  const useFollowCam = (state==='racing'||state==='countdown');

  ctx.fillStyle = '#060d1a';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  if(screenShake>0) ctx.translate(shakeX, shakeY);

  if(useFollowCam){
    ctx.save();
    if(camMode === 0){
      ctx.translate(W/2, H/2);
      ctx.scale(mapZoom, mapZoom);
      ctx.translate(-mapCamX, -mapCamY);
    } else if(camMode === 1){
      ctx.translate(W/2, H/2 + 80);
      ctx.scale(2.2, 2.2);
      ctx.rotate(-(camAngle + Math.PI/2));
      ctx.translate(-camX, -camY);
    } else {
      ctx.translate(W/2, H/2 + 50);
      ctx.scale(1.25, 1.25);
      ctx.rotate(-(camAngle + Math.PI/2));
      ctx.translate(-camX, -camY);
    }
  }

  ctx.drawImage(oc,0,0);

  ctx.save();
  skids.forEach((s,i)=>{ctx.globalAlpha=0.12+0.28*(i/Math.max(1,skids.length-1));ctx.fillStyle=s.drift?'#ff8800':'#0a0a0a';ctx.beginPath();ctx.arc(s.x,s.y,s.drift?3:2,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  ctx.save();
  smoke.forEach(s=>{ctx.globalAlpha=s.life*0.5;ctx.fillStyle=s.nitro?'rgba(60,150,255,0.8)':'rgba(180,180,180,0.8)';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  ctx.save();
  sparks.forEach(s=>{ctx.globalAlpha=s.life;ctx.fillStyle=`hsl(${s.hue||40},100%,70%)`;ctx.beginPath();ctx.arc(s.x,s.y,s.big?5:2.5,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  if(gameMode==='race') [...aiCars,car].forEach(c=>{drawCar(c);drawSpeedLines(c);});
  else {drawCar(car);drawSpeedLines(car);}

  if(useFollowCam) ctx.restore();

  if(state==='racing'||state==='countdown') drawHUD();
  drawSteeringWheel();

  if(lapFlashAlpha>0){
    ctx.save();
    ctx.globalAlpha=lapFlashAlpha*0.18;
    ctx.fillStyle=lapFlashColor;
    ctx.fillRect(0,0,W,H);
    const eg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(1,lapFlashColor);
    ctx.globalAlpha=lapFlashAlpha*0.4;
    ctx.fillStyle=eg;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Lunatic: permanent red danger vignette
  if(aiDifficulty==='hardcore'&&(state==='racing'||state==='countdown')){
    const lv=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    lv.addColorStop(0,'rgba(200,0,0,0)');
    lv.addColorStop(1,'rgba(200,0,0,0.28)');
    ctx.save();ctx.fillStyle=lv;ctx.fillRect(0,0,W,H);ctx.restore();
  }
  if(car.dmgFlash>0){
    const dg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
    dg.addColorStop(0,'rgba(255,0,0,0)');
    dg.addColorStop(1,`rgba(255,0,0,${car.dmgFlash*0.5})`);
    ctx.save();ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);ctx.restore();
  }

  ctx.restore(); // end shake save

  if(state==='countdown'){
    const sec=countdownT;
    const label=sec>3?'3':sec>2?'2':sec>1?'1':'GO!';
    const color=sec>3?'#44ff44':sec>2?'#ffaa00':sec>1?'#ff4444':'#ffd700';
    const frac=(sec%1+1)%1;
    ctx.save();ctx.translate(W/2,H/2-20);ctx.scale(1+frac*0.7,1+frac*0.7);
    ctx.globalAlpha=sec<1?1:Math.min(1,frac*3);
    ctx.font='bold 90px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(label,3,3);
    ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=40;ctx.fillText(label,0,0);
    ctx.restore();

    if(gameMode==='race'&&sec>1){
      ctx.save();
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 16px monospace';
      const posColors=['#ffd700','#c0c0c0','#cd7f32','#aaa'];
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W/2-80,H/2+55,160,34,6);ctx.fill();
      ctx.fillStyle=posColors[playerGridPos-1]||'#aaa';
      ctx.fillText('GRID POSITION  P'+playerGridPos, W/2, H/2+72);
      ctx.restore();
    }
  }

  if(state==='trackselect'){
    ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';

    // Title
    ctx.font='bold 32px monospace';ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,0.3)';ctx.shadowBlur=12;
    ctx.fillText('SELECT TRACK',W/2,32);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px monospace';
    ctx.fillText('5 tracks · Easy → Expert',W/2,52);

    const cardH=85, cardGap=6, startY=65;
    TRACK_DEFS.forEach((td,i)=>{
      const bx=40, by=startY+i*(cardH+cardGap), bw=W-80, bh=cardH;
      const sel=i===trackCursor;

      // Card bg
      ctx.fillStyle=sel?'rgba(255,255,255,0.09)':'rgba(255,255,255,0.03)';
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
      if(sel){ctx.shadowColor=td.color;ctx.shadowBlur=18;}
      ctx.strokeStyle=sel?td.color:'rgba(255,255,255,0.12)';ctx.lineWidth=sel?2:1;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();ctx.shadowBlur=0;

      // Mini track preview (left side)

    const kx=slX+slW*frac, ky=slY+slH/2;
    ctx.fillStyle=fillColor;ctx.beginPath();ctx.arc(kx,ky,11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(kx,ky,4,0,Math.PI*2);ctx.fill();

    // Value
    ctx.fillStyle='#fff';ctx.font='bold 26px monospace';
    ctx.fillText(steerSensitivity.toFixed(1)+'×',W/2,panelY+155);

    // Desc
    const pdesc=steerSensitivity<0.6?'🐢 Very stiff — barely turns':
                steerSensitivity<0.8?'🔵 Understeer — slow to react':
                steerSensitivity<1.1?'✅ Default — well balanced':
                steerSensitivity<1.4?'🟡 Responsive — lively feel':
                steerSensitivity<1.7?'🟠 Twitchy — hard to hold':
                                     '🔴 Extreme — drift machine';
    ctx.fillStyle=fillColor;ctx.font='12px monospace';ctx.fillText(pdesc,W/2,panelY+178);

    // Tick marks
    [0.3,1.0,2.0].forEach(v=>{
      const tx=slX+slW*((v-0.3)/1.7);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px monospace';
      ctx.fillText(v.toFixed(1)+'×',tx,slY+slH+16);
    });

    // Arrow buttons
    const abY=panelY+204, abW=80, abH=38;
    const lAB={x:W/2-slW/2,y:abY,w:abW,h:abH};
    const rAB={x:W/2+slW/2-abW,y:abY,w:abW,h:abH};
    const resetAB={x:W/2-55,y:abY,w:110,h:abH};
    [
      {b:lAB,label:'◀  −',hov:hitTest(lAB)},
      {b:rAB,label:'+  ▶',hov:hitTest(rAB)},
      {b:resetAB,label:'RESET',hov:hitTest(resetAB)},
    ].forEach(({b,label,hov})=>{
      ctx.fillStyle=hov?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.07)';
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,7);ctx.fill();
      ctx.strokeStyle=hov?'#fff':'rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,7);ctx.stroke();
      ctx.fillStyle=hov?'#fff':'rgba(255,255,255,0.65)';ctx.font='bold 13px monospace';
      ctx.fillText(label,b.x+b.w/2,b.y+b.h/2);
    });
    render._pauseLAB=lAB; render._pauseRAB=rAB; render._pauseResetAB=resetAB;

    // Divider
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(panelX+24,panelY+254);ctx.lineTo(panelX+panelW-24,panelY+254);ctx.stroke();

    // Bottom buttons: Resume / Restart / Quit
    const botY=panelY+278, botH=44;
    const resumeB={x:panelX+20,y:botY,w:130,h:botH};
    const restartB={x:panelX+160,y:botY,w:130,h:botH};
    const quitB={x:panelX+310,y:botY,w:130,h:botH};
    [
      {b:resumeB,label:'▶ RESUME',color:'#44aaff'},
      {b:restartB,label:'↺ RESTART',color:'#ffd700'},
      {b:quitB,label:'⏏ QUIT',color:'#888'},
    ].forEach(({b,label,color})=>{
      const hov=hitTest(b);
      ctx.fillStyle=hov?color:'rgba(255,255,255,0.06)';ctx.globalAlpha=hov?0.22:1;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,8);ctx.fill();ctx.globalAlpha=1;
      if(hov){ctx.shadowColor=color;ctx.shadowBlur=14;}
      ctx.strokeStyle=hov?color:'rgba(255,255,255,0.18)';ctx.lineWidth=hov?2:1;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,8);ctx.stroke();ctx.shadowBlur=0;
      ctx.fillStyle=hov?'#fff':color;ctx.font='bold 13px monospace';
      ctx.fillText(label,b.x+b.w/2,b.y+b.h/2);
    });
    render._pauseResumeB=resumeB; render._pauseRestartB=restartB; render._pauseQuitB=quitB;

    // Hint
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px monospace';
    ctx.fillText('ESC / P to resume  ·  ◀▶ to adjust sensitivity',W/2,panelY+panelH-14);
  }
}

function fmt(ms){
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

  wrapper.style.transform=`scale(${s})`;wrapper.style.position='absolute';
  wrapper.style.left=Math.round((window.innerWidth-W*s)/2)+'px';
  wrapper.style.top=Math.round((window.innerHeight-H*s)/2)+'px';
  layoutTouchUI();
}

function bindBtn(id,code){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[code]=true;el.classList.add('pressed');initAudio();};
  const off=e=>{e.preventDefault();keys[code]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off,{passive:false});el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}

const jsCanvas = document.getElementById('joystick-base');
const jsCtx    = jsCanvas.getContext('2d');
const JS_SIZE  = 160;
const JS_R     = 58;
const JS_KNOB  = 26;
let joystickX  = 0;
let joystickY  = 0;
let jsActive   = false;
let jsCenterX  = 0, jsCenterY = 0;
let jsKnobX    = 0, jsKnobY  = 0;

function updateJoystickCenter(){
  const r = jsCanvas.getBoundingClientRect();
  jsCenterX = r.left + r.width/2;
  jsCenterY = r.top  + r.height/2;
}

function jsPointerStart(px, py){jsActive = true;updateJoystickCenter();jsPointerMove(px, py);}
function jsPointerMove(px, py){
  if(!jsActive) return;
  const dx = px - jsCenterX, dy = py - jsCenterY;
  const dist = Math.min(Math.hypot(dx, dy), JS_R);
  const ang  = Math.atan2(dy, dx);
  jsKnobX = Math.cos(ang)*dist;
  jsKnobY = Math.sin(ang)*dist;
  joystickX = jsKnobX / JS_R;
  joystickY = jsKnobY / JS_R;
}
function jsPointerEnd(){jsActive = false;jsKnobX = 0; jsKnobY = 0; joystickX = 0; joystickY = 0;}

// ── Settings slider drag ──────────────────────────────────────
canvas.addEventListener('touchstart', e=>{
  if(state!=='settings') return;
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  const gx=(t.clientX-r.left)/canvasScale, gy=(t.clientY-r.top)/canvasScale;
  const {_sliderX:sx,_sliderY:sy,_sliderW:sw,_sliderH:sh}=render;
  // Hit test: generous area around slider (full width, ±30px vertical)
  if(sx!=null && gx>=sx && gx<=sx+sw && gy>=sy-30 && gy<=sy+sh+30){
    sliderDragging=true;
    setSliderFromX(t.clientX);
    e.preventDefault();
  }
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  if(!sliderDragging) return;
  e.preventDefault();
  setSliderFromX(e.touches[0].clientX);
},{passive:false});
canvas.addEventListener('touchend', e=>{
  sliderDragging=false;
},{passive:false});

// Mouse drag too
canvas.addEventListener('mousedown', e=>{
  if(state!=='settings') return;

  const {_sliderX:sx,_sliderY:sy,_sliderW:sw,_sliderH:sh}=render;

});
window.addEventListener('mousemove', e=>{

});
window.addEventListener('mouseup', ()=>{ sliderDragging=false; });

jsCanvas.addEventListener('touchstart', e=>{e.preventDefault(); initAudio();jsPointerStart(e.touches[0].clientX, e.touches[0].clientY);},{passive:false});
jsCanvas.addEventListener('touchmove', e=>{e.preventDefault();jsPointerMove(e.touches[0].clientX, e.touches[0].clientY);},{passive:false});
jsCanvas.addEventListener('touchend',   e=>{ e.preventDefault(); jsPointerEnd(); },{passive:false});
jsCanvas.addEventListener('touchcancel',e=>{ e.preventDefault(); jsPointerEnd(); },{passive:false});

window.addEventListener('mousemove',   e=>{ if(jsActive) jsPointerMove(e.clientX, e.clientY); });

function drawSteeringWheel(){
  const c = jsCtx, cx = JS_SIZE/2, cy = JS_SIZE/2;
  c.clearRect(0, 0, JS_SIZE, JS_SIZE);
  c.beginPath(); c.arc(cx, cy, JS_R, 0, Math.PI*2);
  c.fillStyle   = 'rgba(0,0,0,0.35)';  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.18)'; c.lineWidth = 2; c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.font = '16px monospace'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('◄', cx - JS_R + 14, cy);
  c.fillText('▶', cx + JS_R - 14, cy);
  c.fillText('▲', cx, cy - JS_R + 14);
  c.fillText('▼', cx, cy + JS_R - 14);
  c.beginPath(); c.arc(cx + jsKnobX + 2, cy + jsKnobY + 3, JS_KNOB, 0, Math.PI*2);
  c.fillStyle = 'rgba(0,0,0,0.3)'; c.fill();
  const grad = c.createRadialGradient(cx+jsKnobX-4,cy+jsKnobY-4,2, cx+jsKnobX,cy+jsKnobY, JS_KNOB);
  grad.addColorStop(0, jsActive ? 'rgba(255,200,100,0.95)' : 'rgba(200,200,200,0.9)');
  grad.addColorStop(1, jsActive ? 'rgba(200,100,0,0.9)'    : 'rgba(80,80,80,0.85)');
  c.beginPath(); c.arc(cx + jsKnobX, cy + jsKnobY, JS_KNOB, 0, Math.PI*2);
  c.fillStyle = grad; c.fill();
  c.strokeStyle = jsActive ? 'rgba(255,160,0,0.8)' : 'rgba(255,255,255,0.3)';
  c.lineWidth = 2; c.stroke();
  c.beginPath(); c.arc(cx + jsKnobX, cy + jsKnobY, 5, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.6)'; c.fill();
}

  const isPortrait = window.innerHeight > window.innerWidth;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  const gx=(t.clientX-r.left)/canvasScale,gy=(t.clientY-r.top)/canvasScale;
  if(state==='start'){
    // Cards: by=H/2-60+i*80, bh=64, bx=W/2-130, bw=260
    const _sBx=W/2-130, _sBw=260;
    for(let i=0;i<3;i++){
      const _by=H/2-60+i*80, _bh=64;
      if(gx>=_sBx&&gx<=_sBx+_sBw&&gy>=_by&&gy<=_by+_bh){
        menuCursor=i;
        if(i===0){gameMode='practice';state='trackselect';}
        else if(i===1){gameMode='race';state='difficulty';}
        else{state='settings';}
        break;
      }
    }
  } else if(state==='settings'){
    const {_settingsLbx:lbx,_settingsRbx:rbx,_settingsArrowY:ay,_settingsBtnH:bh,_settingsBtnW:bw,
           _settingsResetX:rx,_settingsResetY:ry,_settingsResetW:rw,_sliderX:sx,_sliderY:sy2,_sliderW:sw,_settingsSaveBtn:sv}=render;
    if(lbx!=null&&gx>=lbx&&gx<=lbx+bw&&gy>=ay&&gy<=ay+bh) saveSteerSens(Math.max(0.3,steerSensitivity-0.1));
    if(lbx!=null&&gx>=rbx&&gx<=rbx+bw&&gy>=ay&&gy<=ay+bh) saveSteerSens(Math.min(2.0,steerSensitivity+0.1));
    if(rx!=null&&gx>=rx&&gx<=rx+rw&&gy>=ry&&gy<=ry+bh)   saveSteerSens(1.0);
    if(sx!=null&&gx>=sx&&gx<=sx+sw&&gy>=sy2-30&&gy<=sy2+42){ const frac=Math.max(0,Math.min(1,(gx-sx)/sw)); saveSteerSens(0.3+frac*1.7); }
    if(sv&&gx>=sv.x&&gx<=sv.x+sv.w&&gy>=sv.y&&gy<=sv.y+sv.h) state='start';
  } else if(state==='difficulty'){
    for(let i=0;i<4;i++){
      const by=H/2-158+i*82,bh=70;
      if(gy>=by&&gy<=by+bh){
        difficultyCursor=i;
        aiDifficulty=['beginner','normal','pro','hardcore'][i];
        state='trackselect';
        break;
      }
    }
  } else if(state==='trackselect'){
    const cardH=85, cardGap=6, startY=65;
    TRACK_DEFS.forEach((td,i)=>{
      const by=startY+i*(cardH+cardGap);
      if(gx>=40&&gx<=W-40&&gy>=by&&gy<=by+cardH){
        if(i===trackCursor){
          applyTrack(trackCursor);rebuildTrackCanvas();computeMapCam();beginCountdown();
        } else {
          trackCursor=i;
        }
      }
    });
  } else if(state==='pause'){
  } else if(state==='pause'){
    const {_pauseLAB:la,_pauseRAB:ra,_pauseResetAB:rea,_pauseResumeB:rsm,_pauseRestartB:rst,_pauseQuitB:qt}=render;
    if(la&&gx>=la.x&&gx<=la.x+la.w&&gy>=la.y&&gy<=la.y+la.h) saveSteerSens(Math.max(0.3,steerSensitivity-0.1));
    if(ra&&gx>=ra.x&&gx<=ra.x+ra.w&&gy>=ra.y&&gy<=ra.y+ra.h) saveSteerSens(Math.min(2.0,steerSensitivity+0.1));
    if(rea&&gx>=rea.x&&gx<=rea.x+rea.w&&gy>=rea.y&&gy<=rea.y+rea.h) saveSteerSens(1.0);
    if(rsm&&gx>=rsm.x&&gx<=rsm.x+rsm.w&&gy>=rsm.y&&gy<=rsm.y+rsm.h){ initAudio(); state='racing'; }
    if(rst&&gx>=rst.x&&gx<=rst.x+rst.w&&gy>=rst.y&&gy<=rst.y+rst.h){ initAudio(); stopAllSound(); beginCountdown(); }
    if(qt&&gx>=qt.x&&gx<=qt.x+qt.w&&gy>=qt.y&&gy<=qt.y+qt.h){ stopAllSound(); state='start'; }
  } else if(state==='finished'){
    const btnY=H-110;
    if(gx>=W/2-158&&gx<=W/2-10&&gy>=btnY&&gy<=btnY+50){initAudio();if(gameMode==='race'){state='trackselect';}else{beginCountdown();}}
    else if(gx>=W/2+10&&gx<=W/2+148&&gy>=btnY&&gy<=btnY+50){stopAllSound();state='start';}
  }
},{passive:false});

function loop(ts){update(ts);render(ts);requestAnimationFrame(loop);}
requestAnimationFrame(loop);
